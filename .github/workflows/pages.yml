name: Deploy site

# Builds the MyST site and publishes it to GitHub Pages.
#
# The landing page is regenerated from the newest committed snapshot before the
# build, so the published numbers can never drift from the data in the repo.
# The reports and docs are the repo's own markdown -- myst.yml pulls them
# straight into the table of contents.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: pip install pyyaml
      - run: npm install -g mystmd

      - name: Regenerate the landing page from the newest snapshot
        run: python scripts/build_site.py

      - name: Build the MyST site
        # This is a project Pages site served from a subpath, so MyST needs to
        # know the prefix or every asset and internal link 404s.
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
